# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name 178.156.242.253 kannarimusicacademy.com www.kannarimusicacademy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name meet.kannarimusicacademy.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 178.156.242.253 kannarimusicacademy.com www.kannarimusicacademy.com;
    client_max_body_size 2G;
    resolver 127.0.0.11 ipv6=off valid=30s;

    set $frontend_upstream http://frontend:80;
    set $backend_upstream http://backend:8000;

    ssl_certificate /etc/nginx/ssl/letsencrypt/live/kannarimusicacademy.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/letsencrypt/live/kannarimusicacademy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend (React)
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }

    # Django Admin & its static files
    location /admin/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin static files (served by WhiteNoise)
    location /static/admin/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    location /static/rest_framework/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    # Media files
    location /media/ {
        alias /app/media/;
    }
}

server {
    listen 443 ssl;
    server_name meet.kannarimusicacademy.com;
    resolver 127.0.0.11 ipv6=off valid=30s;

    set $jitsi_web_upstream http://jitsi-web:80;

    ssl_certificate /etc/nginx/ssl/letsencrypt/live/kannarimusicacademy.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/letsencrypt/live/kannarimusicacademy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass $jitsi_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /xmpp-websocket {
        proxy_pass $jitsi_web_upstream/xmpp-websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /colibri-ws {
        proxy_pass $jitsi_web_upstream/colibri-ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
